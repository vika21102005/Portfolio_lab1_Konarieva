<h2>Форма зворотного зв'язку</h2>

<form action="#" method="post">

<fieldset>
<legend>Контактна інформація</legend>

<label for="name">Ім'я:</label>
<input type="text" id="name" name="name" placeholder="Ваше ім'я" required>

<br><br>

<label for="email">Email:</label>
<input type="email" id="email" name="email" placeholder="email@example.com" required>

</fieldset>

<fieldset>

<legend>Повідомлення</legend>

<label for="subject">Тема:</label>

<select id="subject" name="subject" required>

<option value="">Оберіть тему</option>
<option value="question">Питання</option>
<option value="cooperation">Співпраця</option>

</select>

<p>Тип звернення:</p>

<label>
<input type="radio" name="type" value="question"> Питання
</label>

<label>
<input type="radio" name="type" value="suggestion"> Пропозиція
</label>

<br><br>

<label for="message">Повідомлення:</label>
<br>

<textarea id="message" name="message" rows="5" placeholder="Ваше повідомлення"></textarea>

</fieldset>

<label>
<input type="checkbox" name="consent" required>
Я погоджуюсь на обробку даних
</label>

<br><br>

<button type="submit">Надіслати</button>

</form>
